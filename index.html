<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Medicine Manager</title>
    <link rel="icon" type="image/png" href="medicine.png" />

    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2 class="logo">MediCare</h2>
        <button id="openModalBtn" class="primary-btn">+ Add Medicine</button>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Smart Medicine Manager</h1>
            <p>Advanced Caretaker Dashboard</p>
          </div>

          <div id="liveClock" class="live-clock"></div>
        </header>

        <div class="controls">
          <input
            type="text"
            id="searchPatient"
            placeholder="Filter by patient name"
          />
        </div>

        <section class="stats">
          <div class="stat-card">
            <h4>Total</h4>
            <p id="totalCount">0</p>
          </div>
          <div class="stat-card">
            <h4>Completed</h4>
            <p id="completedCount">0</p>
          </div>
          <div class="stat-card">
            <h4>Pending</h4>
            <p id="pendingCount">0</p>
          </div>
          <div class="stat-card">
            <h4>Overdue</h4>
            <p id="overdueCount">0</p>
          </div>
        </section>

        <section class="table-section">
          <h2>Today's Schedule</h2>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Medicine</th>
                  <th>Dosage</th>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="medicineTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="medicineModal">
      <div class="modal-content">
        <h3>Add / Edit Medicine</h3>
        <form id="medicineForm">
          <input type="text" id="patient" placeholder="Patient Name" required />
          <input
            type="text"
            id="medicine"
            placeholder="Medicine Name"
            required
          />
          <input type="text" id="dosage" placeholder="Dosage" required />
          <input type="time" id="time" required />

          <div class="modal-actions">
            <button type="submit" class="primary-btn">Save</button>
            <button type="button" id="closeModalBtn" class="secondary-btn">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
